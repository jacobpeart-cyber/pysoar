# PySOAR Docker Compose
# Full-stack deployment with all services

version: '3.8'

services:
  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pysoar-frontend
    ports:
      - "80:80"
    # Bind-mount the host's built dist over the baked-in one so a
    # `vite build` + `docker cp` (or a plain host-side copy) shows up
    # instantly without rebuilding the image. The image still has a
    # valid dist baked in for clean `docker compose up` on fresh hosts.
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Main API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pysoar-api
    env_file:
      - .env
    # Expose SIEM syslog receiver on UDP+TCP 5514 (unprivileged —
    # anything forwarding to this host can ship RFC 3164/5424 syslog
    # directly into the platform without an intermediate collector).
    # The auto-start hook in src/main.py lifespan starts SyslogReceiver
    # when SIEM_SYSLOG_ENABLED=true.
    ports:
      - "5514:5514/udp"
      - "5514:5514/tcp"
    volumes:
      - ./src:/app/src:ro
      - ./alembic:/app/alembic:ro
      - pysoar-uploads:/app/uploads
      - pysoar-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pysoar-network
    restart: unless-stopped
    environment:
      # Default the syslog receiver on so a fresh deploy is already a
      # working SIEM endpoint. Override with SIEM_SYSLOG_ENABLED=false
      # in .env if the operator wants it off.
      SIEM_SYSLOG_ENABLED: "${SIEM_SYSLOG_ENABLED:-true}"
      SIEM_SYSLOG_PORT: "${SIEM_SYSLOG_PORT:-5514}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Celery Worker for background tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pysoar-worker
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
      - pysoar-uploads:/app/uploads
      - pysoar-logs:/app/logs
    depends_on:
      - api
      - redis
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.workers.celery_app inspect ping --timeout 10 2>/dev/null | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # Celery Beat for scheduled tasks
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pysoar-scheduler
    command: celery -A src.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
    depends_on:
      - worker
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Flower - Celery monitoring
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pysoar-flower
    command: celery -A src.workers.celery_app flower --port=5555
    env_file:
      - .env
    depends_on:
      - worker
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pysoar-postgres
    environment:
      - POSTGRES_USER=pysoar
      - POSTGRES_PASSWORD=pysoar
      - POSTGRES_DB=pysoar
    volumes:
      - pysoar-postgres:/var/lib/postgresql/data
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pysoar -d pysoar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: pysoar-redis
    volumes:
      - pysoar-redis:/data
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: pysoar-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - pysoar-prometheus:/prometheus
    depends_on:
      - api
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:10.3.1
    container_name: pysoar-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=pysoar-grafana
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - pysoar-grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy with SSL termination
  nginx:
    image: nginx:1.25-alpine
    container_name: pysoar-nginx
    ports:
      - "443:443"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  pysoar-network:
    driver: bridge

volumes:
  pysoar-postgres:
    driver: local
  pysoar-redis:
    driver: local
  pysoar-uploads:
    driver: local
  pysoar-logs:
    driver: local
  pysoar-prometheus:
    driver: local
  pysoar-grafana:
    driver: local
