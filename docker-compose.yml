# PySOAR Docker Compose
# Full-stack deployment with all services

version: '3.8'

services:
  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pysoar-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Main API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pysoar-api
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
      - ./alembic:/app/alembic:ro
      - pysoar-uploads:/app/uploads
      - pysoar-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Celery Worker for background tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pysoar-worker
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
      - pysoar-uploads:/app/uploads
      - pysoar-logs:/app/logs
    depends_on:
      - api
      - redis
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.workers.celery_app inspect ping --timeout 10 2>/dev/null | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # Celery Beat for scheduled tasks
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pysoar-scheduler
    command: celery -A src.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
    depends_on:
      - worker
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Flower - Celery monitoring
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pysoar-flower
    command: celery -A src.workers.celery_app flower --port=5555
    env_file:
      - .env
    depends_on:
      - worker
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pysoar-postgres
    environment:
      - POSTGRES_USER=pysoar
      - POSTGRES_PASSWORD=pysoar
      - POSTGRES_DB=pysoar
    volumes:
      - pysoar-postgres:/var/lib/postgresql/data
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pysoar -d pysoar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: pysoar-redis
    volumes:
      - pysoar-redis:/data
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: pysoar-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - pysoar-prometheus:/prometheus
    depends_on:
      - api
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:10.3.1
    container_name: pysoar-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=pysoar-grafana
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - pysoar-grafana:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - pysoar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  pysoar-network:
    driver: bridge

volumes:
  pysoar-postgres:
    driver: local
  pysoar-redis:
    driver: local
  pysoar-uploads:
    driver: local
  pysoar-logs:
    driver: local
  pysoar-prometheus:
    driver: local
  pysoar-grafana:
    driver: local
