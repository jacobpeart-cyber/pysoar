global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'pysoar-api'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'pysoar-api'

  - job_name: 'pysoar-health'
    metrics_path: '/api/v1/health'
    scrape_interval: 30s
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'pysoar-health'
